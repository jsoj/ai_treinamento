        const ALL_CLASSES = [

            { id: "c4", title: "4. POPs Expressos", trilha: "1", trilhaName: "Trilha 2: Clareza de Processos", dor: "Processos...", uau: "Transformar áudios..." },

            { id: "c6", title: "6. Tradução Operacional", trilha: "1", trilhaName: "Trilha 2: Clareza de Processos", dor: "Normas densas...", uau: "A IA traduz..." },
            { id: "c7", title: "7. Extração de E-mails", trilha: "1", trilhaName: "Trilha 3: Centralização", dor: "Compromissos...", uau: "A IA gera..." },

            { id: "c9", title: "9. Guias de Problemas", trilha: "1", trilhaName: "Trilha 3: Centralização", dor: "Conhecimento...", uau: "A IA lê..." },
            { id: "c10", title: "10. Fluxos Compartilhados", trilha: "1", trilhaName: "Trilha 3: Centralização", dor: "Muitos controles...", uau: "A IA desenha..." },
            { id: "c11", title: "11. Jupyter p/ Dados", trilha: "2", trilhaName: "Trilha Técnica", dor: "Planilhas...", uau: "Usar o ChatGPT..." },
            { id: "c12", title: "12. KNIME Analytics", trilha: "2", trilhaName: "Trilha Técnica", dor: "A Caixa Preta...", uau: "Construção..." },
            { id: "c13", title: "13. DuckDB + SQL", trilha: "2", trilhaName: "Trilha Técnica", dor: "Demora absurda...", uau: "IA cria consulta..." },
            { id: "c14", title: "14. Automação n8n", trilha: "2", trilhaName: "Trilha Técnica", dor: "Trabalho manual...", uau: "O n8n captura..." },
            { id: "c15", title: "15. Mermaid.js (Fluxos)", trilha: "2", trilhaName: "Trilha Técnica", dor: "Relatos...", uau: "A IA converte..." },
            { id: "c16", title: "16. Streamlit Web Apps", trilha: "2", trilhaName: "Trilha Técnica", dor: "Controles importantes...", uau: "Gerar um sistema..." },
            { id: "c17", title: "17. Scripts c/ Cursor", trilha: "2", trilhaName: "Trilha Técnica", dor: "Micro-tarefas...", uau: "O editor com IA..." },
            { id: "c18", title: "18. Ollama 100% Local", trilha: "2", trilhaName: "Trilha Técnica", dor: "O medo de vazar...", uau: "Rodar uma IA..." },
            { id: "c19", title: "19. AnythingLLM (RAG)", trilha: "2", trilhaName: "Trilha Técnica", dor: "Regras perdidas...", uau: "Subir manuais..." },
            { id: "c20", title: "20. Obsidian (Cérebro)", trilha: "2", trilhaName: "Trilha Técnica", dor: "O histórico...", uau: "Anotações..." }
        ];

        const DATES = [
            "15/06 (Seg)", "16/06 (Ter)", "17/06 (Qua)", "18/06 (Qui)", "19/06 (Sex)", 
            "22/06 (Seg)", "23/06 (Ter)", "24/06 (Qua)", "25/06 (Qui)", "26/06 (Sex)"
        ];

        const INITIAL_STATE = {
            unscheduledClasses: [...ALL_CLASSES],
            days: DATES.map((date, index) => ({
                id: `day_${index + 1}`,
                dateLabel: date,
                facilitators: [], 
                classes: []       
            }))
        };

        let currentState = JSON.parse(JSON.stringify(INITIAL_STATE));
        let isDragging = false;
        let dragPayload = null;

        // INICIA A CONEXÃO COM O SUPABASE
        async function initApp() {
            try {
                // 1. Tenta buscar o estado salvo no banco
                const { data, error } = await supabase.from('board_state').select('state').eq('id', 1).single();
                
                if (error) {
                    throw error;
                }
                
                if (data && data.state && Object.keys(data.state).length > 0) {
                    currentState = data.state;
                }

                updateStatus("Online e Sincronizado", "bg-emerald-500");
                renderApp();

                // 2. Fica escutando mudanças em tempo real feitas por outras abas/pessoas
                supabase.channel('custom-all-channel')
                    .on(
                        'postgres_changes',
                        { event: 'UPDATE', schema: 'public', table: 'board_state', filter: 'id=eq.1' },
                        (payload) => {
                            if (!isDragging) {
                                currentState = payload.new.state;
                                renderApp();
                            }
                        }
                    )
                    .subscribe();

            } catch (err) {
                console.error("Erro ao conectar no Supabase:", err);
                updateStatus("Erro de Conexão", "bg-red-500");
                
                // Fallback para localStorage
                const localSaved = localStorage.getItem('produtiva_kanban_state');
                if(localSaved) currentState = JSON.parse(localSaved);
                renderApp();
            }
        }

        async function saveStateToCloud() {
            try {
                // Salva o novo estado na coluna 'state' onde o 'id' é 1
                await supabase.from('board_state').update({ state: currentState }).eq('id', 1);
            } catch(e) {
                console.error("Erro ao salvar:", e);
                localStorage.setItem('produtiva_kanban_state', JSON.stringify(currentState));
            }
        }

        function updateStatus(text, colorClass) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('status-dot').className = `w-2.5 h-2.5 rounded-full ${colorClass}`;
        }

        // --- GERAÇÃO DOS CARDS ---
        function generateFacCard(facDef, source, instanceId = '') {
            return `
                <div class="card-standard grab-cursor select-none rounded border shadow-sm flex items-center justify-center font-bold text-sm px-1 text-center w-full h-full ${facDef.color}" 
                     draggable="true" data-type="facilitator" data-source="${source}" data-item-id="${facDef.id}" data-instance-id="${instanceId}">
                    👤 ${facDef.name}
                </div>
            `;
        }

        function generateClassCard(clsDef, source) {
            const trilhaColor = clsDef.trilha === "1" ? "border-l-blue-500 bg-white hover:bg-blue-50 text-slate-700" : "border-l-purple-500 bg-white hover:bg-purple-50 text-slate-700";
            return `
                <div class="relative card-standard grab-cursor select-none rounded border border-slate-200 border-l-[4px] shadow-sm flex items-center justify-center text-xs sm:text-sm font-bold px-1 w-full h-full text-center leading-[1.2] ${trilhaColor}" 
                     draggable="true" title="${clsDef.title} (Duplo clique para remover)" data-type="class" data-source="${source}" data-item-id="${clsDef.id}">
                    <span class="pointer-events-none break-words line-clamp-2 px-5">${clsDef.title}</span>
                    <button type="button" onmousedown="event.stopPropagation();" onclick="openClassModal('${clsDef.id}')" class="absolute right-1 hover:bg-slate-200 text-slate-400 hover:text-slate-700 p-1 rounded transition-colors" title="Detalhes do Módulo">
                        <svg class="w-[14px] h-[14px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </button>
                </div>
            `;
        }

        // --- FUNÇÕES DO MODAL ---
        window.openClassModal = function(classId) {
            const cls = ALL_CLASSES.find(c => c.id === classId);
            if (!cls) return;
            document.getElementById('modal-trilha').innerText = cls.trilhaName;
            document.getElementById('modal-title').innerText = cls.title.replace(/^[0-9]+\.\s*/, ''); 
            document.getElementById('modal-dor').innerText = cls.dor;
            document.getElementById('modal-uau').innerText = cls.uau;
            const modal = document.getElementById('class-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        window.closeClassModal = function() {
            const modal = document.getElementById('class-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        document.getElementById('class-modal')?.addEventListener('click', function(e) {
            if (e.target === this) window.closeClassModal();
        });

        // --- RENDENRIZAÇÃO ---
        function renderApp() {
            renderBoard();
            renderFacilitatorsPool();
            renderClassesPool();
            attachDragEvents();
            attachDoubleClickEvents();
        }

        function renderBoard() {
            const datesCol = document.getElementById('col-dates');
            const facCol = document.getElementById('col-fac-drop');
            const classCol = document.getElementById('col-class-drop');
            
            datesCol.innerHTML = ''; facCol.innerHTML = ''; classCol.innerHTML = '';

            currentState.days.forEach(day => {
                datesCol.insertAdjacentHTML('beforeend', `<div class="flex-1 w-full bg-white rounded shadow-sm border border-slate-200 flex items-center justify-center font-bold text-slate-700 text-sm sm:text-base uppercase tracking-wide">${day.dateLabel}</div>`);

                const fDrop = document.createElement('div');
                fDrop.className = "flex-1 w-full dropzone rounded border-2 border-dashed border-slate-300 bg-slate-100/50 flex flex-row items-center justify-center p-1 gap-1 overflow-hidden";
                fDrop.dataset.target = `day_${day.id}_fac`;
                day.facilitators.forEach(fac => {
                    const def = FACILITATORS.find(f => f.id === fac.facilitatorId);
                    if(def) fDrop.insertAdjacentHTML('beforeend', generateFacCard(def, day.id, fac.instanceId));
                });
                facCol.appendChild(fDrop);

                const cDrop = document.createElement('div');
                cDrop.className = "flex-1 w-full dropzone rounded border-2 border-dashed border-slate-300 bg-slate-100/50 flex flex-row items-center justify-center p-1 gap-1 overflow-hidden";
                cDrop.dataset.target = `day_${day.id}_class`;
                day.classes.forEach(cls => {
                    cDrop.insertAdjacentHTML('beforeend', generateClassCard(cls, day.id));
                });
                classCol.appendChild(cDrop);
            });
        }

        function renderFacilitatorsPool() {
            const container = document.getElementById('pool-facilitators');
            container.innerHTML = '';
            for(let i = 0; i < 10; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = "flex-1 w-full min-h-0";
                if(FACILITATORS[i]) {
                    wrapper.innerHTML = generateFacCard(FACILITATORS[i], 'pool');
                } else {
                    wrapper.classList.add('pointer-events-none');
                }
                container.appendChild(wrapper);
            }
        }

        function renderClassesPool() {
            const container = document.getElementById('pool-classes');
            container.innerHTML = '';
            const classes = currentState.unscheduledClasses || [];
            let rendered = 0;
            classes.forEach(cls => {
                const wrapper = document.createElement('div');
                wrapper.className = "flex-1 w-full min-h-0";
                wrapper.innerHTML = generateClassCard(cls, 'pool');
                container.appendChild(wrapper);
                rendered++;
            });
            for(let i = rendered; i < 20; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = "flex-1 w-full min-h-0 pointer-events-none";
                container.appendChild(wrapper);
            }
        }

        // --- ARRASTAR E SOLTAR ---
        function attachDragEvents() {
            document.querySelectorAll('[draggable="true"]').forEach(el => {
                el.addEventListener('dragstart', (e) => {
                    isDragging = true;
                    el.classList.add('opacity-40');
                    dragPayload = { type: el.dataset.type, source: el.dataset.source, itemId: el.dataset.itemId, instanceId: el.dataset.instanceId || null };
                    e.dataTransfer.effectAllowed = 'copyMove';
                    e.dataTransfer.setData('text/plain', JSON.stringify(dragPayload));
                });
                el.addEventListener('dragend', (e) => {
                    isDragging = false;
                    el.classList.remove('opacity-40');
                    document.querySelectorAll('.drag-over').forEach(dz => dz.classList.remove('drag-over'));
                });
            });

            document.querySelectorAll('.dropzone').forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault(); 
                    e.dataTransfer.dropEffect = 'move';
                    const targetData = e.currentTarget.dataset.target; 
                    const isFacilitatorDrag = dragPayload?.type === 'facilitator';
                    const isClassDrag = dragPayload?.type === 'class';
                    if ((isFacilitatorDrag && (targetData.endsWith('_fac') || targetData === 'pool-facilitators')) || 
                        (isClassDrag && (targetData.endsWith('_class') || targetData === 'pool-classes'))) {
                        e.currentTarget.classList.add('drag-over');
                    }
                });
                zone.addEventListener('dragleave', (e) => { e.currentTarget.classList.remove('drag-over'); });
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    e.currentTarget.classList.remove('drag-over');
                    if (!dragPayload) return;
                    processDrop(dragPayload, e.currentTarget.dataset.target);
                    dragPayload = null;
                });
            });
        }

        function attachDoubleClickEvents() {
            document.querySelectorAll('#col-class-drop [draggable="true"], #col-fac-drop [draggable="true"]').forEach(el => {
                el.addEventListener('dblclick', (e) => {
                    if (el.dataset.type === 'class') removeClassFromDay(el.dataset.source, el.dataset.itemId);
                    if (el.dataset.type === 'facilitator') removeFacilitatorFromDay(el.dataset.source, el.dataset.instanceId);
                });
            });
        }

        function processDrop(payload, target) {
            const { type, source, itemId, instanceId } = payload;
            let stateChanged = false;

            if (type === 'facilitator') {
                if (target.startsWith('day_')) {
                    const targetDayId = target.replace('day_', '').replace('_fac', '');
                    if (source === 'pool') {
                        currentState.days.find(d => d.id === targetDayId)?.facilitators.push({ instanceId: 'fac_' + Math.random().toString(36).substr(2, 9), facilitatorId: itemId });
                        stateChanged = true;
                    } else if (source.startsWith('day_') && source !== targetDayId) {
                        const sDay = currentState.days.find(d => d.id === source);
                        const tDay = currentState.days.find(d => d.id === targetDayId);
                        const idx = sDay.facilitators.findIndex(f => f.instanceId === instanceId);
                        if (idx > -1) { tDay.facilitators.push(sDay.facilitators.splice(idx, 1)[0]); stateChanged = true; }
                    }
                } else if (target === 'pool-facilitators' && source.startsWith('day_')) {
                    removeFacilitatorFromDay(source, instanceId); return;
                }
            }

            if (type === 'class') {
                if (target.startsWith('day_')) {
                    const targetDayId = target.replace('day_', '').replace('_class', '');
                    if (source === 'pool') {
                        const classIndex = currentState.unscheduledClasses.findIndex(c => c.id === itemId);
                        const tDay = currentState.days.find(d => d.id === targetDayId);
                        if (classIndex > -1 && tDay) {
                            tDay.classes.push(currentState.unscheduledClasses.splice(classIndex, 1)[0]);
                            stateChanged = true;
                        }
                    } else if (source.startsWith('day_') && source !== targetDayId) {
                        const sDay = currentState.days.find(d => d.id === source);
                        const tDay = currentState.days.find(d => d.id === targetDayId);
                        const idx = sDay.classes.findIndex(c => c.id === itemId);
                        if (idx > -1) { tDay.classes.push(sDay.classes.splice(idx, 1)[0]); stateChanged = true; }
                    }
                } else if (target === 'pool-classes' && source.startsWith('day_')) {
                    removeClassFromDay(source, itemId); return;
                }
            }

            if (stateChanged) { renderApp(); saveStateToCloud(); }
        }

        function removeClassFromDay(dayId, classId) {
            const day = currentState.days.find(d => d.id === dayId);
            if (day) {
                const idx = day.classes.findIndex(c => c.id === classId);
                if (idx > -1) {
                    currentState.unscheduledClasses.push(day.classes.splice(idx, 1)[0]);
                    currentState.unscheduledClasses.sort((a, b) => parseInt(a.id.replace('c', '')) - parseInt(b.id.replace('c', '')));
                    renderApp(); saveStateToCloud();
                }
            }
        }

        function removeFacilitatorFromDay(dayId, instanceId) {
            const day = currentState.days.find(d => d.id === dayId);
            if (day) {
                day.facilitators = day.facilitators.filter(f => f.instanceId !== instanceId);
                renderApp(); saveStateToCloud();
            }
        }

        // Dá o pontapé inicial na aplicação
        initApp();
    </script>
